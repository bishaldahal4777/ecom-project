{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <div class="alert alert-success text-center">
        <h3>Payment Successful ✅</h3>
        <p>Thank you for your purchase!</p>
        <!-- ✅ Using 'data' dict from decoded eSewa response, not 'order' object -->
        <p>Transaction ID: <b>{{ data.transaction_uuid }}</b></p>
        <p>Total Paid: <b>Nrs {{ data.total_amount }}</b></p>
        <p>Status: <b>{{ data.status }}</b></p>
        <a href="{% url 'home' %}" class="btn btn-primary mt-3">Back to Home</a>
    </div>
</div>
{% endblock %}
